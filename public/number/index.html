<style>
  .score-fly {
    position: absolute;
    font-size: 1.5rem;
    font-weight: bold;
    color: #0071e3;
    animation: flyUp 1s ease-out forwards;
    pointer-events: none;
  }
  @keyframes flyUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-60px); }
  }
  .firework {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: red;
    animation: explode 0.6s ease-out forwards;
    z-index: 100;
    pointer-events: none;
  }
  @keyframes explode {
    0% { transform: scale(1) translate(-50%, -50%) rotate(0deg); opacity: 1; }
    100% { transform: scale(10) translate(-50%, -50%) rotate(720deg); opacity: 0; }
  }
  .combo-text {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem;
    font-weight: 900;
    color: #ff3366;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff3366;
    z-index: 10000;
    opacity: 0;
    animation: combo-fade 2s ease-out;
  }
  @keyframes combo-fade {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
</style>
<script>

  const WIDTH = 5, HEIGHT = 6, INITIAL_TIME = 60, SCORE_INC = 5;
  let grid = [], score = 0, bestScore = 0, target = 10, selected = [], time = INITIAL_TIME, timer;
  let gameOn = false, comboCount = 0;

  const pastelColors = [
  "#d93636", // 진한 핑크
  "#e69200", // 진한 주황
  "#d9513f", // 진한 코랄
  "#1fa69a", // 진한 민트
  "#3c6f2a", // 진한 초록
  "#d85c00", // 진한 진주황
  "#e1796c", // 진한 연분홍
  "#52746d", // 진한 회청
  "#14988d"  // 진한 청록
];

  const gridTable = document.getElementById('grid-table');
  const scoreEl = document.getElementById('score');
  const bestScoreEl = document.getElementById('best-score');
  const timerEl = document.getElementById('timer');
  const targetEl = document.getElementById('target-sum');
  const sound = document.getElementById('score-sound');
  const failSound = document.getElementById('fail-sound');
  const sound3 = document.getElementById('sound3');
  const sound6 = document.getElementById('sound6');
  const sound9 = document.getElementById('sound9');
  const bgMusic = document.getElementById('bg-music');
  const muteImgBtn = document.getElementById('mute-img-btn');
  const targetModal = document.getElementById('target-modal');
  const confirmTargetBtn = document.getElementById('confirm-target-btn');
  const modalBtns = document.querySelectorAll('.modal-btn');
  const targetBox = document.getElementById('target-box');
  const gameoverModal = document.getElementById('gameover-modal');
  const finalScoreEl = document.getElementById('final-score');
  const restartPopupBtn = document.getElementById('restart-button');

  sound3.volume = 0.4;
  sound6.volume = 0.4;
  sound9.volume = 0.9;
  bgMusic.volume = 0.4;

  function initGame() {
    loadBestScore();
    grid = Array.from({ length: HEIGHT }, () => Array(WIDTH).fill(0));
    gridTable.innerHTML = '';
    for (let r = 0; r < HEIGHT; r++) {
      const row = document.createElement('tr');
      for (let c = 0; c < WIDTH; c++) {
        const td = document.createElement('td');
        td.dataset.row = r;
        td.dataset.col = c;
        td.addEventListener('click', onCellClick);
        row.appendChild(td);
      }
      gridTable.appendChild(row);
    }
    score = 0;
    comboCount = 0;
    updateDisplay();
    fillGrid();
    resetTimer();
    gameOn = true;
  }

  function fillGrid() {
    const pairs = [];
    for (let i = 1; i <= target / 2; i++) {
      const j = target - i;
      if (i <= j) pairs.push([i, j]);
    }
    let empty = [];
    for (let r = 0; r < HEIGHT; r++)
      for (let c = 0; c < WIDTH; c++)
        if (grid[r][c] === 0) empty.push([r, c]);
    let values = [];
    while (values.length < empty.length) {
      const [a, b] = pairs[Math.floor(Math.random() * pairs.length)];
      values.push(a);
      if (values.length < empty.length) values.push(b);
    }
    values.sort(() => Math.random() - 0.5);
    empty.forEach(([r, c], i) => grid[r][c] = values[i]);
    updateGrid();
  }

  function updateGrid() {
    for (let r = 0; r < HEIGHT; r++) {
      for (let c = 0; c < WIDTH; c++) {
        const cell = gridTable.rows[r].cells[c];
        const val = grid[r][c];
        cell.textContent = val || '';
        cell.className = val === 0 ? 'empty' : '';

      // 🎨 랜덤 색상 적용
      if (val > 0) {
        const randomColor = pastelColors[Math.floor(Math.random() * pastelColors.length)];
        cell.style.color = randomColor;
      } else {
        cell.style.color = "";
      }
    }
  }
}

  function onCellClick(e) {
    if (!gameOn) return;
    const r = +e.target.dataset.row;
    const c = +e.target.dataset.col;
    if (grid[r][c] === 0) return;
    const idx = selected.findIndex(([sr, sc]) => sr === r && sc === c);
    if (idx !== -1) {
      selected.splice(idx, 1);
      e.target.classList.remove('selected');
    } else {
      selected.push([r, c]);
      e.target.classList.add('selected');
    }
    if (selected.length === 2) checkMatch();
  }

  function checkMatch() {
    const [[r1, c1], [r2, c2]] = selected;
    const sum = grid[r1][c1] + grid[r2][c2];
    if (sum === target) {
      grid[r1][c1] = 0;
      grid[r2][c2] = 0;
      score += SCORE_INC;
      comboCount++;
      showScoreFly(r1, c1);
      sound.currentTime = 0;
      sound.play();
      if (comboCount % 3 === 0 && comboCount <= 200) {
        showCombo(comboCount);
      }
    } else {
      comboCount = 0;
      failSound.currentTime = 0;
      failSound.play();
    }
    selected.forEach(([r, c]) => gridTable.rows[r].cells[c].classList.remove('selected'));
    selected = [];
    updateDisplay();
    updateGrid();
    if (isGridEmpty()) setTimeout(fillGrid, 300);
  }

  function showCombo(combo) {
    const text = document.createElement('div');
    text.className = 'combo-text';
    text.textContent = `${combo} Combo!`;
    document.body.appendChild(text);
    setTimeout(() => text.remove(), 2000);
    showFireworks();
    playComboSound(combo);
  }

  function showFireworks() {
    for (let i = 0; i < 30; i++) {
      const firework = document.createElement('div');
      firework.className = 'firework';
      firework.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
      firework.style.top = `${Math.random() * 100}%`;
      firework.style.left = `${Math.random() * 100}%`;
      document.body.appendChild(firework);
      setTimeout(() => firework.remove(), 600);
    }
  }

  function playComboSound(combo) {
    const remainder = combo % 9;
    let sound;
    if (remainder === 3) sound = sound3;
    else if (remainder === 6) sound = sound6;
    else sound = sound9;
    sound.currentTime = 0;
    sound.play().catch(() => {});
  }

  function isGridEmpty() {
    return grid.every(row => row.every(cell => cell === 0));
  }

  function updateDisplay() {
    scoreEl.textContent = score;
    targetEl.textContent = target;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('bestScore', bestScore);
    }
    bestScoreEl.textContent = `최고 점수: ${bestScore}`;
  }

  function resetTimer() {
    clearInterval(timer);
    time = INITIAL_TIME;
    timerEl.textContent = time;
    timer = setInterval(() => {
      time--;
      timerEl.textContent = time;
      if (time <= 0) endGame();
    }, 1000);
  }

  function endGame() {
    clearInterval(timer);
    gameOn = false;
    finalScoreEl.textContent = score;
    gameoverModal.style.display = 'flex';
  }

  function showScoreFly(r, c) {
    const cell = gridTable.rows[r].cells[c];
    const rect = cell.getBoundingClientRect();
    const fly = document.createElement('div');
    fly.className = 'score-fly';
    fly.textContent = '+5';
    fly.style.left = `${rect.left + rect.width / 2}px`;
    fly.style.top = `${rect.top + window.scrollY}px`;
    document.body.appendChild(fly);
    setTimeout(() => fly.remove(), 1000);
  }

  function loadBestScore() {
    bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
  }

  // 이벤트 바인딩
  document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('intro').style.display = 'none';
    bgMusic.muted = false;
    bgMusic.play().catch(() => {}).finally(() => {
    initGame(); // ✅ play 성공 여부와 상관없이 항상 실행됨
  });
});

  muteImgBtn.addEventListener('click', () => {
  bgMusic.muted = !bgMusic.muted;
  muteImgBtn.src = bgMusic.muted
    ? "/number/assets/sound-off.png"  // 음소거
    : "/number/assets/sound-on.png"; // 음소거 해제
});


  document.getElementById('restart-btn').onclick = initGame;
  restartPopupBtn.onclick = () => {
    gameoverModal.style.display = 'none';
    initGame();
  };
  document.getElementById('target-sum-btn').onclick = () => targetModal.style.display = 'flex';
  targetBox.onclick = () => gameOn && (targetModal.style.display = 'flex');
  confirmTargetBtn.onclick = () => {
    const selectedValue = document.querySelector('.modal-btn.selected');
    if (selectedValue) {
      target = parseInt(selectedValue.dataset.value);
      targetEl.textContent = target;
      targetModal.style.display = "none";
      initGame();
    }
  };
  modalBtns.forEach(btn => {
    btn.onclick = () => {
      modalBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
  });

  });

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', function (e) {
