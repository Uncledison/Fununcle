<style>
  .score-fly {

  .firework {

    height: 6px;
    border-radius: 50%;
    background: red;
    animation: explode 0.6s ease-out forwards;
    z-index: 100;
    pointer-events: none;
  }
  @keyframes explode {
    0% { transform: scale(1) translate(-50%, -50%) rotate(0deg); opacity: 1; }
    100% { transform: scale(10) translate(-50%, -50%) rotate(720deg); opacity: 0; }
  }
  .combo-text {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2rem;
    font-weight: 900;
    color: #ff3366;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff3366;
    z-index: 10000;
    opacity: 0;
    animation: combo-fade 2s ease-out;
  }
  @keyframes combo-fade {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
</style>
<script>

  const WIDTH = 5, HEIGHT = 6, INITIAL_TIME = 60, SCORE_INC = 5;
  let grid = [], score = 0, bestScore = 0, target = 10, selected = [], time = INITIAL_TIME, timer;
  let gameOn = false, comboCount = 0, paused = false;

  const pastelColors = [
  "#d93636", // 진한 핑크
  "#e69200", // 진한 주황
  "#d9513f", // 진한 코랄
  "#1fa69a", // 진한 민트
  "#3c6f2a", // 진한 초록
  "#d85c00", // 진한 진주황
  "#e1796c", // 진한 연분홍
  "#52746d", // 진한 회청
  "#14988d"  // 진한 청록
];

  const gridTable = document.getElementById('grid-table');
  const scoreEl = document.getElementById('score');
  const bestScoreEl = document.getElementById('best-score');
  const timerEl = document.getElementById('timer');
  const targetEl = document.getElementById('target-sum');
  const sound = document.getElementById('score-sound');
  const failSound = document.getElementById('fail-sound');
  const sound3 = document.getElementById('sound3');
  const sound6 = document.getElementById('sound6');
  const sound9 = document.getElementById('sound9');
  const bgMusic = document.getElementById('bg-music');
  const muteBtn = document.getElementById('mute-btn');
  const targetModal = document.getElementById('target-modal');
  const confirmTargetBtn = document.getElementById('confirm-target-btn');
  const modalBtns = document.querySelectorAll('.modal-btn');
  const targetBox = document.getElementById('target-box');
  const gameoverModal = document.getElementById('gameover-modal');
  const finalScoreEl = document.getElementById('final-score');
  const restartPopupBtn = document.getElementById('restart-button');
  const pauseBtn = document.getElementById('pause-btn');
  const pauseModal = document.getElementById('pause-modal');
  const resumeBtn = document.getElementById('resume-btn');
  const shareScoreBtn = document.getElementById('share-score-btn');
  const quitBtn = document.getElementById('quit-button');
  const bestLineEl = document.getElementById('best-line');
  let challengeScore = null;   // 도전장으로 받은 점수(없으면 null)

  sound3.volume = 0.4;
  sound6.volume = 0.4;
  sound9.volume = 0.9;
  bgMusic.volume = 0.4;

  function initGame() {
    loadBestScore();
    grid = Array.from({ length: HEIGHT }, () => Array(WIDTH).fill(0));
    gridTable.innerHTML = '';
    for (let r = 0; r < HEIGHT; r++) {
      const row = document.createElement('tr');
      for (let c = 0; c < WIDTH; c++) {
        const td = document.createElement('td');
        td.dataset.row = r;
        td.dataset.col = c;
        td.addEventListener('click', onCellClick);
        row.appendChild(td);
      }
      gridTable.appendChild(row);
    }
    score = 0;
    comboCount = 0;
    updateDisplay();
    fillGrid();
    resetTimer();
    gameOn = true;
    paused = false;
    pauseModal.style.display = 'none';
  }

  function fillGrid() {
    const pairs = [];
    for (let i = 1; i <= target / 2; i++) {
      const j = target - i;
      if (i <= j) pairs.push([i, j]);
    }
    let empty = [];
    for (let r = 0; r < HEIGHT; r++)
      for (let c = 0; c < WIDTH; c++)
        if (grid[r][c] === 0) empty.push([r, c]);
    let values = [];
    while (values.length < empty.length) {
      const [a, b] = pairs[Math.floor(Math.random() * pairs.length)];
      values.push(a);
      if (values.length < empty.length) values.push(b);
    }
    values.sort(() => Math.random() - 0.5);
    empty.forEach(([r, c], i) => grid[r][c] = values[i]);
    updateGrid();
  }

  function updateGrid() {
    for (let r = 0; r < HEIGHT; r++) {
      for (let c = 0; c < WIDTH; c++) {
        const cell = gridTable.rows[r].cells[c];
        const val = grid[r][c];
        cell.textContent = val || '';
        cell.className = val === 0 ? 'empty' : '';

      // 🎨 랜덤 색상 적용
      if (val > 0) {
        const randomColor = pastelColors[Math.floor(Math.random() * pastelColors.length)];
        cell.style.color = randomColor;
      } else {
        cell.style.color = "";
      }
    }
  }
}

  function onCellClick(e) {
    if (!gameOn || paused) return;
    const r = +e.target.dataset.row;
    const c = +e.target.dataset.col;
    if (grid[r][c] === 0) return;
    const idx = selected.findIndex(([sr, sc]) => sr === r && sc === c);
    if (idx !== -1) {
      selected.splice(idx, 1);
      e.target.classList.remove('selected');
    } else {
      selected.push([r, c]);
      e.target.classList.add('selected');
    }
    if (selected.length === 2) checkMatch();
  }

  function checkMatch() {
    const [[r1, c1], [r2, c2]] = selected;
    const sum = grid[r1][c1] + grid[r2][c2];
    if (sum === target) {
      grid[r1][c1] = 0;
      grid[r2][c2] = 0;
      score += SCORE_INC;
      comboCount++;
      showScoreFly(r1, c1);
      sound.currentTime = 0;
      sound.play();
      if (comboCount % 3 === 0 && comboCount <= 200) {
        showCombo(comboCount);
      }
    } else {
      comboCount = 0;
      failSound.currentTime = 0;
      failSound.play();
    }
    selected.forEach(([r, c]) => gridTable.rows[r].cells[c].classList.remove('selected'));
    selected = [];
    updateDisplay();
    updateGrid();
    if (isGridEmpty()) setTimeout(fillGrid, 300);
  }

  function showCombo(combo) {
    const text = document.createElement('div');
    text.className = 'combo-text';
    text.textContent = `${combo} Combo!`;
    document.body.appendChild(text);
    setTimeout(() => text.remove(), 2000);
    showFireworks();
    playComboSound(combo);
  }

  function showFireworks() {
    for (let i = 0; i < 30; i++) {
      const firework = document.createElement('div');
      firework.className = 'firework';
      firework.style.background = `hsl(${Math.random() * 360}, 100%, 60%)`;
      firework.style.top = `${Math.random() * 100}%`;
      firework.style.left = `${Math.random() * 100}%`;
      document.body.appendChild(firework);
      setTimeout(() => firework.remove(), 600);
    }
  }

  function playComboSound(combo) {
    const remainder = combo % 9;
    let sound;
    if (remainder === 3) sound = sound3;
    else if (remainder === 6) sound = sound6;
    else sound = sound9;
    sound.currentTime = 0;
    sound.play().catch(() => {});
  }

  function isGridEmpty() {
    return grid.every(row => row.every(cell => cell === 0));
  }

  function updateDisplay() {
    scoreEl.textContent = score;
    targetEl.textContent = target;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('bestScore', bestScore);
    }
    bestScoreEl.textContent = `최고 점수: ${bestScore}`;
  }

  function resetTimer() {
    clearInterval(timer);
    time = INITIAL_TIME;
    timerEl.textContent = time;
    timer = setInterval(() => {
      time--;
      timerEl.textContent = time;
      if (time <= 0) endGame();
    }, 1000);
  }

  function endGame() {
    clearInterval(timer);
    gameOn = false;
    paused = false;
    finalScoreEl.textContent = score;
    bestLineEl.textContent = (score >= bestScore && score > 0) ? '🏆 최고 기록 갱신!' : `최고 기록 ${bestScore}점`;
    const msgEl = document.getElementById('gameover-message');
    if (challengeScore !== null && score > challengeScore) {
      msgEl.textContent = `도전 성공! 🎉 친구 ${challengeScore}점 넘김`;
    } else if (challengeScore !== null) {
      msgEl.textContent = `아쉽! 친구 점수는 ${challengeScore}점 😤`;
    } else {
      msgEl.textContent = '게임오버! 🎉';
    }
    gameoverModal.style.display = 'flex';
  }

  function showScoreFly(r, c) {
    const cell = gridTable.rows[r].cells[c];
    const rect = cell.getBoundingClientRect();
    const fly = document.createElement('div');
    fly.className = 'score-fly';
    fly.textContent = '+5';
    fly.style.left = `${rect.left + rect.width / 2}px`;
    fly.style.top = `${rect.top + window.scrollY}px`;
    document.body.appendChild(fly);
    setTimeout(() => fly.remove(), 1000);
  }

  function loadBestScore() {
    bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
  }

  // 이벤트 바인딩
  // 시작 버튼: (체크 시) 안내 끄기 저장 → 음악 켜고 게임 시작
  document.getElementById('start-btn').addEventListener('click', () => {
    if (document.getElementById('hide-intro-check').checked) {
      try { localStorage.setItem('number_hideIntro', 'true'); } catch (e) {}
    }
    document.getElementById('intro').style.display = 'none';
    bgMusic.muted = false;
    bgMusic.play().catch(() => {}).finally(() => {
      initGame(); // ✅ play 성공 여부와 상관없이 항상 실행됨
    });
  });

  // 제스처 없는 진입(도전장·안내끄기) — 음악은 음소거로 시작
  function autoStartMuted() {
    document.getElementById('intro').style.display = 'none';
    bgMusic.muted = true;
    muteBtn.textContent = '🔇';
    initGame();
  }

  // 🔥 도전 토스트
  function showChallengeToast(cs) {
    const t = document.createElement('div');
    t.textContent = `🔥 친구가 ${cs}점에 도전장! 목표 ${target}로 도전!`;
    t.style.cssText = 'position:fixed; top:14px; left:50%; transform:translateX(-50%); background:#ff3366; color:#fff; font-weight:bold; padding:10px 18px; border-radius:24px; z-index:9800; font-size:0.92rem; box-shadow:0 4px 16px rgba(0,0,0,0.3); max-width:92%; text-align:center;';
    document.body.appendChild(t);
    setTimeout(() => { t.style.transition = 'opacity 0.6s'; t.style.opacity = '0'; setTimeout(() => t.remove(), 600); }, 4500);
  }

  // 💬 내 점수를 카톡 도전장으로 공유
  function shareScore() {
    const k = window.Kakao;
    if (!k) return;
    if (!k.isInitialized()) k.init('8e68190d1ba932955a557fbf0ae0b659');
    const my = score;
    const link = `https://fun.uncledison.com/number?challenge=${my}&target=${target}`;
    k.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: `숫자 맞추기 🎯 나 ${my}점! 넌 몇 점?`,
        description: `60초 안에 숫자 2개로 목표(${target})를 만드는 퍼즐! ${my}점 넘어봐 👀`,
        imageUrl: 'https://fun.uncledison.com/assets/number_kakao.png',
        link: { mobileWebUrl: link, webUrl: link },
      },
      buttons: [{ title: `${my}점에 도전하기`, link: { mobileWebUrl: link, webUrl: link } }],
    });
  }

  // 진입 처리: 도전장 링크 우선, 없으면 안내끄기 설정 적용
  const _cp = new URLSearchParams(location.search);
  const _cs = parseInt(_cp.get('challenge'));
  if (!isNaN(_cs)) {
    challengeScore = _cs;
    const _ct = parseInt(_cp.get('target'));
    if (!isNaN(_ct) && _ct >= 10 && _ct <= 20) { target = _ct; targetEl.textContent = target; }
    showChallengeToast(_cs);
    autoStartMuted();
  } else if (localStorage.getItem('number_hideIntro') === 'true') {
    autoStartMuted();
  }

  // ⏸ 일시정지 / 계속하기
  function pauseGame() {
    if (!gameOn || paused) return;
    paused = true;
    clearInterval(timer);
    try { bgMusic.pause(); } catch (e) {}   // 배경음악도 정지
    pauseModal.style.display = 'flex';
  }
  function resumeGame() {
    if (!paused) return;
    paused = false;
    pauseModal.style.display = 'none';
    if (!bgMusic.muted) { bgMusic.play().catch(() => {}); }   // 음소거 아니면 음악 재개
    timer = setInterval(() => {
      time--;
      timerEl.textContent = time;
      if (time <= 0) endGame();
    }, 1000);
  }
  pauseBtn.addEventListener('click', pauseGame);
  resumeBtn.addEventListener('click', resumeGame);

  muteBtn.addEventListener('click', () => {
    bgMusic.muted = !bgMusic.muted;
    muteBtn.textContent = bgMusic.muted ? '🔇' : '🔊';
  });

  document.getElementById('restart-btn').onclick = initGame;
  restartPopupBtn.onclick = () => {
    gameoverModal.style.display = 'none';
    initGame();
  };
  // 💬 게임오버에서 점수 자랑하기
  shareScoreBtn.onclick = shareScore;
  // 🚪 그만하기 — 음악 정지 + 첫 화면(타이틀)로
  quitBtn.onclick = () => {
    gameoverModal.style.display = 'none';
    try { bgMusic.pause(); } catch (e) {}
    bgMusic.muted = true;
    muteBtn.textContent = '🔇';
    document.getElementById('intro').style.display = 'flex';
  };
  // 목표 모달 열기 — 현재 목표 점수를 미리 선택해서 보여줌
  function openTargetModal() {
    modalBtns.forEach(b => b.classList.toggle('selected', parseInt(b.dataset.value) === target));
    targetModal.style.display = 'flex';
  }
  document.getElementById('target-sum-btn').onclick = openTargetModal;
  targetBox.onclick = () => { if (gameOn) openTargetModal(); };
  confirmTargetBtn.onclick = () => {
    const selectedValue = document.querySelector('.modal-btn.selected');
    targetModal.style.display = "none";              // 확인하면 항상 창 닫기
    if (selectedValue) {
      const newTarget = parseInt(selectedValue.dataset.value);
      if (newTarget !== target) {                    // 목표가 바뀐 경우에만 새 게임 시작
        target = newTarget;
        targetEl.textContent = target;
        initGame();
      }
      // 목표가 그대로면 진행 중인 게임을 그대로 유지
    }
  };
  modalBtns.forEach(btn => {
    btn.onclick = () => {
      modalBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
  });

  // 카카오톡 공유
  document.getElementById('kakao-share-btn').addEventListener('click', () => {
    const k = window.Kakao;
    if (!k) return;
    if (!k.isInitialized()) k.init('8e68190d1ba932955a557fbf0ae0b659');
    k.Share.sendDefault({
      objectType: 'feed',
      content: {
        title: '숫자 맞추기 퍼즐 🎯',
        description: "숫자를 조합해 목표 점수를 완성하는 중독성 퍼즐! 60초 도전 ✨",
        imageUrl: 'https://fun.uncledison.com/assets/number_kakao.png',
        link: { mobileWebUrl: 'https://fun.uncledison.com/number', webUrl: 'https://fun.uncledison.com/number' },
      },
      buttons: [{ title: '게임하러 가기', link: { mobileWebUrl: 'https://fun.uncledison.com/number', webUrl: 'https://fun.uncledison.com/number' } }],
    });
  });

  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', function (e) {
    if (e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) ||
        (e.ctrlKey && e.key === 'U')) {
      e.preventDefault();
    }
  });
</script>

<footer style="margin-top: 0px; padding: 5px; text-align: center; font-size: 0.9rem; color: white;">
    <a href="https://fun.uncledison.com" target="_blank" rel="noopener" style="color: white; text-decoration: none;">
    fun.uncledison.com
    </a>
  </footer>
