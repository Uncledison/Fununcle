    <script>
        let currentOperator = 'all';
        let difficulty = 'medium';
        let score = 0;
        let combo = 0;
        let gameLevel = 1;
        let levelProgress = 0;
        const REQ_PROGRESS = 3;

        let lives = 3;
        let isGameOver = false;
        let isLevelingUp = false;

        let canvas = null;
        let ctx = null;

        const VIEW_WIDTH = 540;
        const VIEW_HEIGHT = 800;
        const WALL_LEFT = 28;
        const WALL_RIGHT = VIEW_WIDTH - 28;

        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;

        let currentQuestion = { question: '', answer: 0 };
        let targetStones = [];
        let playerStone = null;
        let particles = [];
        let textAlerts = [];
        let shakeFrames = 0;

        let timeDilation = 1.0;
        let dilationTimer = 0;

        let isDragging = false;
        let dragStartPoint = null;
        let dragEndPoint = null;

        let lastPatternKey = null;
        let lastCorrectSlot = -1;
        let lastQuestionStr = '';

        let obstacles = [];

        const PATTERNS = {
            basic: [{ x: 80, y: 240 }, { x: 175, y: 185 }, { x: 270, y: 155 }, { x: 365, y: 185 }, { x: 460, y: 240 }],
            vShape: [{ x: 70, y: 265 }, { x: 160, y: 210 }, { x: 270, y: 160 }, { x: 380, y: 210 }, { x: 470, y: 265 }],
            stairs: [{ x: 90, y: 245 }, { x: 170, y: 215 }, { x: 250, y: 185 }, { x: 330, y: 155 }, { x: 410, y: 135 }],
            cluster: [{ x: 180, y: 200 }, { x: 230, y: 170 }, { x: 270, y: 195 }, { x: 310, y: 165 }, { x: 360, y: 205 }],
            circle: [{ x: 270, y: 135 }, { x: 180, y: 195 }, { x: 360, y: 195 }, { x: 200, y: 255 }, { x: 340, y: 255 }],
            mountain: [{ x: 80, y: 170 }, { x: 160, y: 225 }, { x: 270, y: 265 }, { x: 380, y: 225 }, { x: 460, y: 170 }],
            zigzag: [{ x: 70, y: 165 }, { x: 150, y: 235 }, { x: 270, y: 170 }, { x: 390, y: 235 }, { x: 470, y: 165 }],
            wideArc: [{ x: 60, y: 245 }, { x: 140, y: 190 }, { x: 270, y: 145 }, { x: 400, y: 190 }, { x: 480, y: 245 }]
        };

        function getTargetPositions() {
            let available = ['basic', 'vShape', 'mountain', 'zigzag'];
            if (gameLevel >= 3) available.push('stairs', 'wideArc');
            if (gameLevel >= 5) available.push('cluster');
            if (gameLevel >= 7) available.push('circle');

            let filtered = available.filter(k => k !== lastPatternKey);
            if (filtered.length === 0) filtered = available;

            const selected = filtered[Math.floor(Math.random() * filtered.length)];
            lastPatternKey = selected;
            return PATTERNS[selected];
        }

        const AudioEngine = {
            ctx: null,
            bgm01: new Audio('bgm01.mp3'),
            bgm02: new Audio('bgm02.mp3'),
            currentBgm: null,
            isMuted: false,
            toggleMute() {
                this.isMuted = !this.isMuted;
                if (this.currentBgm) {
                    this.currentBgm.volume = this.isMuted ? 0 : 0.4;
                }
                const btn = document.getElementById('muteBtn');
                if (btn) btn.innerText = this.isMuted ? '🔇' : '🔊';
            },
            init() { 
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
                this.bgm01.loop = true;
                this.bgm02.loop = true;
            },
            playBgm(type) {
                this.init();
                const nextBgm = type === 1 ? this.bgm01 : this.bgm02;
                if (this.currentBgm === nextBgm) return;
                
                if (this.currentBgm) {
                    this.fadeBgm(this.currentBgm, 0, () => {
                        this.currentBgm.pause();
                        this.currentBgm = nextBgm;
                        this.currentBgm.volume = 0;
                        this.currentBgm.play().catch(e=>console.log(e));
                        this.fadeBgm(this.currentBgm, this.isMuted ? 0 : 0.4);
                    });
                } else {
                    this.currentBgm = nextBgm;
                    this.currentBgm.volume = 0;
                    this.currentBgm.play().catch(e=>console.log(e));
                    this.fadeBgm(this.currentBgm, this.isMuted ? 0 : 0.4);
                }
            },
            stopBgm() {
                if (this.currentBgm) {
                    this.fadeBgm(this.currentBgm, 0, () => {
                        this.currentBgm.pause();
                        this.currentBgm.currentTime = 0;
                        this.currentBgm = null;
                    });
                }
            },
            fadeBgm(audio, targetVolume, callback) {
                const step = targetVolume > audio.volume ? 0.05 : -0.05;
                const interval = setInterval(() => {
                    let newVol = audio.volume + step;
                    if ((step > 0 && newVol >= targetVolume) || (step < 0 && newVol <= targetVolume)) {
                        audio.volume = targetVolume;
                        clearInterval(interval);
                        if (callback) callback();
                    } else {
                        audio.volume = Math.max(0, Math.min(1, newVol));
                    }
                }, 50);
            },
            playLaunch() {
                if (this.isMuted) return;
                this.init();
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(190, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(450, this.ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.15);
                osc.start(); osc.stop(this.ctx.currentTime + 0.15);
            },
            playCorrect(combo = 1) {
                if (this.isMuted) return;
                this.init();
                const pitchShift = Math.min((combo - 1) * 1.05, 1.5); // Increase pitch with combo
                const notes = [523.25 * (1+pitchShift), 659.25 * (1+pitchShift), 783.99 * (1+pitchShift), 1046.50 * (1+pitchShift)];
                notes.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime + idx * 0.04);
                    gain.gain.setValueAtTime(0.08, this.ctx.currentTime + idx * 0.04);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + idx * 0.04 + 0.2);
                    osc.start(this.ctx.currentTime + idx * 0.04); osc.stop(this.ctx.currentTime + idx * 0.04 + 0.2);
                });
            },
            playWrong() {
                if (this.isMuted) return;
                this.init();
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.connect(gain); gain.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
                osc.start(); osc.stop(this.ctx.currentTime + 0.3);
            },
            playLevelUp() {
                if (this.isMuted) return;
                this.init();
                const notes = [587.33, 698.46, 880.00, 1174.66];
                notes.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime + idx * 0.06);
                    gain.gain.setValueAtTime(0.12, this.ctx.currentTime + idx * 0.06);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + idx * 0.06 + 0.3);
                    osc.start(this.ctx.currentTime + idx * 0.06); osc.stop(this.ctx.currentTime + idx * 0.06 + 0.3);
                });
            },
            playSweep() {
                if (this.isMuted) return;
                this.init();
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = 'triangle'; osc.connect(gain); gain.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(950 + Math.random() * 200, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.015, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            }
        };

        const DIFF_CONFIG = {
            easy: { min: 1, max: 9, multMax: 5 },
            medium: { min: 5, max: 25, multMax: 9 },
            hard: { min: 10, max: 99, multMax: 15 }
        };

        window.onload = function() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            bindEvents();
        };

        function resizeCanvas() {
            if (!canvas) return;
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            scale = Math.min(canvas.width / VIEW_WIDTH, canvas.height / VIEW_HEIGHT);
            offsetX = (canvas.width - VIEW_WIDTH * scale) / 2;
            offsetY = (canvas.height - VIEW_HEIGHT * scale) / 2;
        }

        function selectOperator(op) {
            document.querySelectorAll('.segment-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-op') === op);
            });
            currentOperator = op;
        }

        function selectDifficulty(diff) {
            ['easy', 'medium', 'hard'].forEach(d => {
                const btn = document.getElementById(`diff-${d}`);
                if (btn) btn.classList.toggle('active', d === diff);
            });
            difficulty = diff;
        }

        function generateMathQuestion() {
            const config = {
                min: DIFF_CONFIG[difficulty].min,
                max: DIFF_CONFIG[difficulty].max + (gameLevel * 2),
                multMax: DIFF_CONFIG[difficulty].multMax + Math.floor(gameLevel / 2)
            };
            
            let op = currentOperator;
            if (op === 'all') {
                const ops = ['+', '-', '*', '/'];
                op = ops[Math.floor(Math.random() * ops.length)];
            }

            let num1, num2, questionStr, answerVal;
            let safety = 0;

            do {
                safety++;
                switch(op) {
                    case '+':
                        num1 = Math.floor(Math.random() * (config.max - config.min + 1)) + config.min;
                        num2 = Math.floor(Math.random() * (config.max - config.min + 1)) + config.min;
                        questionStr = `${num1} + ${num2}`; answerVal = num1 + num2; break;
                    case '-':
                        num1 = Math.floor(Math.random() * (config.max - config.min + 1)) + config.min + 5;
                        num2 = Math.floor(Math.random() * num1) + 1;
                        questionStr = `${num1} - ${num2}`; answerVal = num1 - num2; break;
                    case '*':
                        num1 = Math.floor(Math.random() * (config.multMax - 2 + 1)) + 2;
                        num2 = Math.floor(Math.random() * 7) + 2;
                        questionStr = `${num1} × ${num2}`; answerVal = num1 * num2; break;
                    case '/':
                        num2 = Math.floor(Math.random() * 7) + 2;
                        answerVal = Math.floor(Math.random() * (config.multMax - 2 + 1)) + 2;
                        num1 = num2 * answerVal;
                        questionStr = `${num1} ÷ ${num2}`; break;
                }
            } while (questionStr === lastQuestionStr && safety < 50);

            lastQuestionStr = questionStr;
            return { question: questionStr + " = ?", answer: answerVal };
        }

        function generateFakes(correctAnswer) {
            const fakes = new Set();
            let safety = 0;
            while (fakes.size < 4 && safety < 300) {
                safety++;
                let offset = Math.floor(Math.random() * 19) - 9;
                let fake = correctAnswer + offset;
                if (fake >= 0 && fake !== correctAnswer && !fakes.has(fake)) {
                    fakes.add(fake);
                }
            }
            let filler = 0;
            while (fakes.size < 4) {
                if (!fakes.has(filler) && filler !== correctAnswer) fakes.add(filler);
                filler++;
            }
            return Array.from(fakes);
        }

        function initGameObjects() {
            currentQuestion = generateMathQuestion();
            document.getElementById('questionText').innerText = currentQuestion.question;

            const positions = getTargetPositions();
            const fakes = generateFakes(currentQuestion.answer);

            let allValues = [...fakes, currentQuestion.answer];
            allValues.sort(() => Math.random() - 0.5);

            let correctIdx = allValues.indexOf(currentQuestion.answer);
            if (correctIdx === lastCorrectSlot && allValues.length > 1) {
                let swapIdx = (lastCorrectSlot + 2 + Math.floor(Math.random() * 3)) % 5;
                [allValues[correctIdx], allValues[swapIdx]] = [allValues[swapIdx], allValues[correctIdx]];
                correctIdx = swapIdx;
            }
            lastCorrectSlot = correctIdx;

            targetStones = positions.map((pos, i) => ({
                x: pos.x, y: pos.y, radius: 38,
                value: allValues[i],
                isCorrect: allValues[i] === currentQuestion.answer
            }));

            resetPlayerStone();
            updateObstaclesForLevel();
        }

        function resetPlayerStone() {
            playerStone = {
                x: VIEW_WIDTH / 2, y: VIEW_HEIGHT - 125, radius: 36,
                isLaunched: false, vx: 0, vy: 0, angle: 0, targetAngleVelocity: 0, trail: []
            };
            isDragging = false;
        }

        function getCanvasMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left - offsetX) / scale,
                y: (clientY - rect.top - offsetY) / scale
            };
        }

        function bindEvents() {
            const onDown = (e) => {
                if (isGameOver || isLevelingUp || !playerStone || playerStone.isLaunched) return;
                const pos = getCanvasMousePos(e);
                if (Math.hypot(pos.x - playerStone.x, pos.y - playerStone.y) < playerStone.radius + 35) {
                    isDragging = true;
                    dragStartPoint = { x: playerStone.x, y: playerStone.y };
                    dragEndPoint = pos;
                    document.getElementById('slingshotTip').classList.add('hidden');
                }
            };

            const onMove = (e) => {
                if (isDragging) {
                    dragEndPoint = getCanvasMousePos(e);
                }
            };

            const onUp = () => {
                if (!isDragging) return;
                isDragging = false;
                const dx = dragEndPoint.x - dragStartPoint.x;
                const dy = dragEndPoint.y - dragStartPoint.y;
                if (Math.hypot(dx, dy) > 15) {
                    playerStone.vx = -dx * 0.27;
                    playerStone.vy = -dy * 0.27;
                    playerStone.targetAngleVelocity = (Math.random() - 0.5) * 0.18;
                    const speed = Math.hypot(playerStone.vx, playerStone.vy);
                    if (speed > 24) {
                        playerStone.vx = (playerStone.vx / speed) * 24;
                        playerStone.vy = (playerStone.vy / speed) * 24;
                    }
                    playerStone.isLaunched = true;
                    AudioEngine.playLaunch();
                }
            };

            canvas.addEventListener('mousedown', onDown);
            canvas.addEventListener('touchstart', onDown, { passive: true });
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, { passive: true });
            window.addEventListener('mouseup', onUp);
            window.addEventListener('touchend', onUp, { passive: true });
        }

        function isPositionValid(x, y, radius) {
            // 컬링볼 지름의 1.5배 이상 거리 (약 108px)
            const minDist = 38 + radius + 72 * 1.5;
            for (let stone of targetStones) {
                const dx = x - stone.x;
                const dy = y - stone.y;
                const dist = Math.hypot(dx, dy);
                if (dist < minDist) {
                    return false;
                }
            }
            return true;
        }

        function updateObstaclesForLevel() {
            obstacles = [];

            if (gameLevel === 2) {
                let attempts = 0;
                let placed = false;
                while (!placed && attempts < 60) {
                    const x = 200 + Math.random() * 140;
                    const y = 230 + Math.random() * 80;
                    if (isPositionValid(x, y, 15)) {
                        obstacles.push({ x, y, radius: 15, vx: 0, type: 'fixed' });
                        placed = true;
                    }
                    attempts++;
                }
            }

            if (gameLevel === 3) {
                // 고정돌
                let attempts = 0;
                let placed = false;
                while (!placed && attempts < 60) {
                    const x = 190 + Math.random() * 110;
                    const y = 225 + Math.random() * 70;
                    if (isPositionValid(x, y, 15)) {
                        obstacles.push({ x, y, radius: 15, vx: 0, type: 'fixed' });
                        placed = true;
                    }
                    attempts++;
                }
                // 이동돌
                attempts = 0;
                placed = false;
                while (!placed && attempts < 60) {
                    const x = 80 + Math.random() * 70;
                    const y = 410 + Math.random() * 90;
                    if (isPositionValid(x, y, 15)) {
                        obstacles.push({ x, y, radius: 15, vx: (Math.random() > 0.5 ? 1.15 : -1.15) * 1.05, type: 'moving' });
                        placed = true;
                    }
                    attempts++;
                }
            }

            if (gameLevel === 4) {
                for (let i = 0; i < 2; i++) {
                    let attempts = 0;
                    let placed = false;
                    while (!placed && attempts < 60) {
                        const x = 140 + Math.random() * 260;
                        const y = 215 + Math.random() * 90;
                        if (isPositionValid(x, y, 14)) {
                            obstacles.push({ x, y, radius: 14, vx: 0, type: 'fixed' });
                            placed = true;
                        }
                        attempts++;
                    }
                }
                let attempts = 0;
                let placed = false;
                while (!placed && attempts < 60) {
                    const x = 70 + Math.random() * 60;
                    const y = 440 + Math.random() * 80;
                    if (isPositionValid(x, y, 14)) {
                        obstacles.push({ x, y, radius: 14, vx: (Math.random() > 0.5 ? -1.25 : 1.25) * 1.1, type: 'moving' });
                        placed = true;
                    }
                    attempts++;
                }
            }

            if (gameLevel >= 5) {
                const fixedCount = Math.min(2 + Math.floor((gameLevel - 4) / 2), 4);
                const movingCount = Math.min(1 + Math.floor((gameLevel - 4) / 3), 3);

                for (let i = 0; i < fixedCount; i++) {
                    let attempts = 0;
                    let placed = false;
                    while (!placed && attempts < 60) {
                        const x = 140 + Math.random() * (VIEW_WIDTH - 280);
                        const y = 200 + Math.random() * 160;
                        if (isPositionValid(x, y, 14)) {
                            obstacles.push({ x, y, radius: 14, vx: 0, type: 'fixed' });
                            placed = true;
                        }
                        attempts++;
                    }
                }

                for (let i = 0; i < movingCount; i++) {
                    let attempts = 0;
                    let placed = false;
                    while (!placed && attempts < 60) {
                        const x = 60 + Math.random() * 90;
                        const y = 390 + Math.random() * 130;
                        if (isPositionValid(x, y, 14)) {
                            obstacles.push({ x, y, radius: 14, vx: (Math.random() > 0.5 ? -1.35 : 1.35) * (1.05 + gameLevel * 0.02), type: 'moving' });
                            placed = true;
                        }
                        attempts++;
                    }
                }
            }
        }

        function updateObstacles() {
            obstacles.forEach(obs => {
                if (obs.type === 'moving') {
                    obs.x += obs.vx * timeDilation;
                    if (obs.x - obs.radius < WALL_LEFT || obs.x + obs.radius > WALL_RIGHT) {
                        obs.vx *= -1;
                        obs.x = Math.max(WALL_LEFT + obs.radius, Math.min(WALL_RIGHT - obs.radius, obs.x));
                    }
                }
            });
        }

        function checkObstacleCollisions() {
            if (!playerStone || !playerStone.isLaunched) return;

            obstacles.forEach(obs => {
                const dx = playerStone.x - obs.x;
                const dy = playerStone.y - obs.y;
                const dist = Math.hypot(dx, dy);
                const minDist = playerStone.radius + obs.radius + 2;

                if (dist < minDist && dist > 0.1) {
                    const nx = dx / dist;
                    const ny = dy / dist;
                    const overlap = minDist - dist;

                    playerStone.x += nx * overlap * 0.6;
                    playerStone.y += ny * overlap * 0.6;

                    const dot = playerStone.vx * nx + playerStone.vy * ny;
                    playerStone.vx -= 2 * dot * nx * 0.92;
                    playerStone.vy -= 2 * dot * ny * 0.92;

                    const isMoving = obs.type === 'moving';
                    const pCount = isMoving ? 12 : 8;
                    const pColor = isMoving ? '#00d4ff' : '#6c6c70';

                    for (let k = 0; k < pCount; k++) {
                        particles.push({
                            x: (playerStone.x + obs.x) / 2,
                            y: (playerStone.y + obs.y) / 2,
                            vx: (Math.random() - 0.5) * 4.5,
                            vy: (Math.random() - 0.5) * 4.5,
                            color: pColor,
                            radius: isMoving ? 2.2 : 1.8,
                            alpha: 0.85,
                            decay: 0.08
                        });
                    }

                    AudioEngine.playSweep();
                }
            });
        }

        function triggerFlashEffect() {
            const el = document.getElementById('damageFlash');
            el.style.opacity = '1';
            setTimeout(() => el.style.opacity = '0', 90);
        }

        function updatePhysics() {
            if (dilationTimer > 0) {
                dilationTimer--;
                if (dilationTimer <= 0) timeDilation = 1.0;
            }

            if (playerStone && playerStone.isLaunched) {
                playerStone.x += playerStone.vx * timeDilation;
                playerStone.y += playerStone.vy * timeDilation;
                playerStone.angle += playerStone.targetAngleVelocity * timeDilation;

                playerStone.vx *= 0.985;
                playerStone.vy *= 0.985;

                playerStone.trail.push({ x: playerStone.x, y: playerStone.y });
                if (playerStone.trail.length > 11) playerStone.trail.shift();

                if (playerStone.x < WALL_LEFT + playerStone.radius) {
                    playerStone.x = WALL_LEFT + playerStone.radius;
                    playerStone.vx = Math.abs(playerStone.vx) * 0.92;
                }
                if (playerStone.x > WALL_RIGHT - playerStone.radius) {
                    playerStone.x = WALL_RIGHT - playerStone.radius;
                    playerStone.vx = -Math.abs(playerStone.vx) * 0.92;
                }

                if (Math.hypot(playerStone.vx, playerStone.vy) < 0.12) resetPlayerStone();
                if (playerStone.y < -20 || playerStone.y > VIEW_HEIGHT + 20) resetPlayerStone();

                updateObstacles();
                checkObstacleCollisions();

                for (let i = targetStones.length - 1; i >= 0; i--) {
                    const stone = targetStones[i];
                    const dist = Math.hypot(stone.x - playerStone.x, stone.y - playerStone.y);
                    if (dist < playerStone.radius + stone.radius) {
                        if (stone.isCorrect) {
                            combo++;
                            levelProgress++;
                            score += 28 * combo * gameLevel;

                            timeDilation = 0.12;
                            dilationTimer = 9;
                            shakeFrames = 22;
                            AudioEngine.playCorrect(combo);
                            if (navigator.vibrate) navigator.vibrate(40);
                            createSpectacleExplosion(stone.x, stone.y);

                            let alertMsg = combo >= 3 ? `COMBO x${combo}!` : "PERFECT!";
                            spawnTextAlert(alertMsg, stone.x, stone.y - 25, "#007aff", true);

                            targetStones.splice(i, 1);
                            playerStone.isLaunched = false;

                            if (levelProgress >= REQ_PROGRESS) {
                                triggerLevelUp();
                            } else {
                                setTimeout(() => { if (!isGameOver && !isLevelingUp) initGameObjects(); }, 380);
                            }
                        } else {
                            combo = 0;
                            lives--;
                            updateLivesDisplay();
                            shakeFrames = 16;
                            triggerFlashEffect();
                            AudioEngine.playWrong();
                            spawnTextAlert("LIFE -1", stone.x, stone.y, "#ff3b30", false);
                            playerStone.vx *= -0.55;
                            playerStone.vy *= -0.55;

                            if (lives <= 0) {
                                endGame();
                            }
                        }
                        break;
                    }
                }
            }
        }

        function triggerLevelUp() {
            gameLevel++;
            levelProgress = 0;
            isLevelingUp = true;
            shakeFrames = 30;
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            AudioEngine.playLevelUp();
            if (gameLevel === 5) {
                AudioEngine.playBgm(2);
            }

            for (let i = 0; i < 55; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2.8 + Math.random() * 7.5;
                particles.push({
                    x: VIEW_WIDTH / 2, y: VIEW_HEIGHT / 2 - 90,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    color: Math.random() > 0.5 ? '#34c759' : '#ff9500',
                    radius: 2.8, alpha: 1, decay: 0.018
                });
            }

            document.getElementById('levelUpModal').classList.remove('hidden');
            document.getElementById('levelUpNumber').innerText = `LEVEL ${gameLevel}`;
        }

        function continueAfterLevelUp() {
            document.getElementById('levelUpModal').classList.add('hidden');
            isLevelingUp = false;
            initGameObjects();
        }

        function createSpectacleExplosion(x, y) {
            let pCount = combo >= 3 ? 65 : 35;
            const colors = ['#34c759', '#ff9500', '#007aff', '#ffcc00', '#ff3b30', '#ffffff'];
            for (let i = 0; i < pCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3.5 + Math.random() * 8.5;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    radius: 2.0 + Math.random() * 3.5,
                    isShard: Math.random() > 0.5, alpha: 1, decay: 0.022
                });
            }
        }

        function spawnTextAlert(text, x, y, color, isBig) {
            textAlerts.push({
                text: text, x: x, y: y, color: color, alpha: 1,
                fontSize: isBig ? 28 : 16, fontStyle: isBig ? '800' : '700', life: 45,
                vy: -1.2
            });
        }

        function updateLivesDisplay() {
            const livesEl = document.getElementById('hudLives');
            if (livesEl) {
                livesEl.innerHTML = '❤️ '.repeat(lives).trim();
            }
        }

        function updateHUD() {
            document.getElementById('hudScore').innerText = score;
            document.getElementById('hudLevel').innerText = gameLevel;
            document.getElementById('hudProgress').innerText = `목표: ${levelProgress} / ${REQ_PROGRESS}`;
            updateLivesDisplay();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.beginPath(); ctx.rect(0, 0, VIEW_WIDTH, VIEW_HEIGHT); ctx.clip();
            ctx.scale(scale, scale);

            if (shakeFrames > 0) {
                ctx.translate((Math.random() - 0.5) * 5.5, (Math.random() - 0.5) * 5.5);
                shakeFrames--;
            }

            const bgGrad = ctx.createLinearGradient(VIEW_WIDTH/2, 0, VIEW_WIDTH/2, VIEW_HEIGHT);
            if (gameLevel < 3) {
                bgGrad.addColorStop(0, '#cce2f0'); bgGrad.addColorStop(0.5, '#f0f6fa'); bgGrad.addColorStop(1, '#ffffff');
            } else if (gameLevel < 5) {
                bgGrad.addColorStop(0, '#ffe8d6'); bgGrad.addColorStop(0.5, '#fff6f0'); bgGrad.addColorStop(1, '#ffffff');
            } else if (gameLevel < 7) {
                bgGrad.addColorStop(0, '#e0cce0'); bgGrad.addColorStop(0.5, '#f6f0f6'); bgGrad.addColorStop(1, '#ffffff');
            } else {
                bgGrad.addColorStop(0, '#1c1c1e'); bgGrad.addColorStop(0.5, '#2c2c2e'); bgGrad.addColorStop(1, '#3a3a3c');
            }
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1;
            const iceLines = [
                [40, 100, 180, 120], [300, 80, 450, 150], [100, 400, 220, 450],
                [50, 650, 190, 620], [350, 550, 480, 610], [200, 250, 280, 220]
            ];
            iceLines.forEach(line => {
                ctx.beginPath(); ctx.moveTo(line[0], line[1]); ctx.lineTo(line[2], line[3]); ctx.stroke();
            });

            const hx = VIEW_WIDTH / 2;
            const hy = 190;
            ctx.save();
            ctx.strokeStyle = "rgba(0, 122, 255, 0.16)";
            ctx.lineWidth = 5;
            ctx.shadowColor = "rgba(0, 122, 255, 0.25)";
            ctx.shadowBlur = 9;
            ctx.beginPath(); ctx.arc(hx, hy, 125, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = "rgba(255, 59, 48, 0.12)";
            ctx.lineWidth = 3;
            ctx.shadowBlur = 5;
            ctx.beginPath(); ctx.arc(hx, hy, 65, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();

            ctx.strokeStyle = "rgba(0, 122, 255, 0.07)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(hx, hy - 140); ctx.lineTo(hx, hy + 140);
            ctx.moveTo(hx - 140, hy); ctx.lineTo(hx + 140, hy);
            ctx.stroke();

            if (isDragging && dragStartPoint && dragEndPoint) {
                const dx = dragEndPoint.x - dragStartPoint.x;
                const dy = dragEndPoint.y - dragStartPoint.y;
                let vx = -dx;
                let vy = -dy;
                const len = Math.hypot(vx, vy);
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(playerStone.x, playerStone.y);
                ctx.lineTo(playerStone.x + dx, playerStone.y + dy);
                ctx.strokeStyle = "rgba(0, 122, 255, 0.4)";
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 8]);
                ctx.stroke();
                ctx.restore();

                if (len > 5) {
                    vx /= len;
                    vy /= len;
                    drawLaserPath(playerStone.x, playerStone.y, vx, vy);
                }
            }

            if (playerStone && playerStone.trail.length > 0) {
                playerStone.trail.forEach((t, idx) => {
                    ctx.save();
                    ctx.globalAlpha = (combo >= 3 ? 0.07 : 0.025) * (idx + 1);
                    ctx.translate(t.x, t.y);
                    ctx.beginPath(); ctx.arc(0, 0, playerStone.radius, 0, Math.PI * 2);
                    ctx.fillStyle = combo >= 3 ? "#ff9500" : "#ffffff"; ctx.fill();
                    ctx.restore();
                });
            }

            targetStones.forEach(stone => {
                ctx.save();
                ctx.translate(stone.x, stone.y);
                ctx.beginPath(); ctx.arc(2, 4, stone.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0,0,0,0.04)"; ctx.fill();

                const stoneGrad = ctx.createRadialGradient(-2, -2, 2, 0, 0, stone.radius);
                stoneGrad.addColorStop(0, "#48484a");
                stoneGrad.addColorStop(0.8, "#2c2c2e");
                stoneGrad.addColorStop(1, "#1c1c1e");
                ctx.beginPath(); ctx.arc(0, 0, stone.radius, 0, Math.PI * 2);
                ctx.fillStyle = stoneGrad; ctx.fill();

                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 26px -apple-system, BlinkMacSystemFont, sans-serif";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(stone.value, 0, 1);
                ctx.restore();
            });

            obstacles.forEach(obs => {
                ctx.save();
                ctx.translate(obs.x, obs.y);

                if (obs.type === 'moving') {
                    ctx.beginPath(); ctx.arc(3, 5, obs.radius, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(0, 180, 255, 0.25)"; ctx.fill();

                    const blueGrad = ctx.createRadialGradient(-2, -2, 2, 3, 3, obs.radius);
                    blueGrad.addColorStop(0, '#00d4ff');
                    blueGrad.addColorStop(0.6, '#0099cc');
                    blueGrad.addColorStop(1, '#006699');
                    ctx.beginPath(); ctx.arc(0, 0, obs.radius, 0, Math.PI * 2);
                    ctx.fillStyle = blueGrad; ctx.fill();

                    ctx.strokeStyle = 'rgba(0, 200, 255, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, obs.radius, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.arc(3, 5, obs.radius, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.fill();

                    const grayGrad = ctx.createRadialGradient(-2, -2, 2, 3, 3, obs.radius);
                    grayGrad.addColorStop(0, '#5a5a5e');
                    grayGrad.addColorStop(0.6, '#3a3a3e');
                    grayGrad.addColorStop(1, '#252528');
                    ctx.beginPath(); ctx.arc(0, 0, obs.radius, 0, Math.PI * 2);
                    ctx.fillStyle = grayGrad; ctx.fill();

                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.arc(0, 0, obs.radius, 0, Math.PI * 2);
                    ctx.stroke();

                    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(-obs.radius*0.5, -obs.radius*0.3); ctx.lineTo(obs.radius*0.4, obs.radius*0.5); ctx.stroke();
                }
                ctx.restore();
            });

            if (playerStone) {
                ctx.save();
                ctx.translate(playerStone.x, playerStone.y);
                ctx.rotate(playerStone.angle);

                ctx.beginPath(); ctx.arc(2, 5, playerStone.radius, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fill();

                ctx.beginPath(); ctx.arc(0, 0, playerStone.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#ffffff"; ctx.fill();
                ctx.strokeStyle = combo >= 3 ? "#ff9500" : "#d1d1d6";
                ctx.lineWidth = 2.5; ctx.stroke();

                const tr = playerStone.radius * 0.8;
                ctx.save();
                ctx.beginPath(); ctx.arc(0, 0, tr, 0, Math.PI * 2); ctx.clip();
                ctx.beginPath(); ctx.arc(0, 0, tr, 0, Math.PI); ctx.fillStyle = "#007aff"; ctx.fill();
                ctx.beginPath(); ctx.arc(0, 0, tr, Math.PI, 0); ctx.fillStyle = "#ff3b30"; ctx.fill();
                ctx.beginPath(); ctx.arc(-tr/2, 0, tr/2, 0, Math.PI * 2); ctx.fillStyle = "#ff3b30"; ctx.fill();
                ctx.beginPath(); ctx.arc(tr/2, 0, tr/2, 0, Math.PI * 2); ctx.fillStyle = "#007aff"; ctx.fill();
                ctx.restore();

                const shine = ctx.createRadialGradient(-playerStone.radius*0.2, -playerStone.radius*0.2, 0, -playerStone.radius*0.2, -playerStone.radius*0.2, playerStone.radius*0.8);
                shine.addColorStop(0, 'rgba(255,255,255,0.4)');
                shine.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.beginPath(); ctx.arc(0, 0, playerStone.radius, 0, Math.PI * 2);
                ctx.fillStyle = shine; ctx.fill();
                ctx.restore();
            }

            particles.forEach((p, index) => {
                p.x += p.vx * timeDilation; p.y += p.vy * timeDilation;
                p.alpha -= p.decay * timeDilation;
                if (p.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    ctx.save(); ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    if (p.isShard) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y - p.radius);
                        ctx.lineTo(p.x + p.radius, p.y + p.radius);
                        ctx.lineTo(p.x - p.radius, p.y + p.radius);
                        ctx.closePath(); ctx.fill();
                    } else {
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                    }
                    ctx.restore();
                }
            });

            textAlerts.forEach((alert, idx) => {
                alert.y += alert.vy; alert.vy *= 0.92;
                alert.life--; alert.alpha = Math.max(0, alert.life / 45);
                if (alert.life <= 0) {
                    textAlerts.splice(idx, 1);
                } else {
                    ctx.save(); ctx.globalAlpha = alert.alpha;
                    ctx.fillStyle = alert.color;
                    ctx.font = `${alert.fontStyle} ${alert.fontSize}px sans-serif`;
                    ctx.textAlign = 'center'; ctx.fillText(alert.text, alert.x, alert.y);
                    ctx.restore();
                }
            });

            const vignette = ctx.createRadialGradient(VIEW_WIDTH/2, VIEW_HEIGHT/2, VIEW_HEIGHT*0.4, VIEW_WIDTH/2, VIEW_HEIGHT/2, VIEW_HEIGHT*0.7);
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(12, 24, 38, 0.07)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

            ctx.restore();
        }

        let loopId = null;
        function gameLoop() {
            if (isGameOver) return;
            if (!isLevelingUp) updatePhysics();
            render();
            loopId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            score = 0; combo = 0; gameLevel = 1; levelProgress = 0;
            lives = 3;
            isGameOver = false;
            isLevelingUp = false;
            timeDilation = 1.0; dilationTimer = 0;
            particles = []; textAlerts = []; obstacles = [];
            lastPatternKey = null;
            lastCorrectSlot = -1;
            lastQuestionStr = '';

            document.getElementById('lobbyScreen').classList.add('hidden');
            document.getElementById('gameOverModal').classList.add('hidden');
            document.getElementById('levelUpModal').classList.add('hidden');
            document.getElementById('playScreen').classList.remove('hidden');
            document.getElementById('slingshotTip').classList.remove('hidden');

            AudioEngine.playBgm(1);

            updateHUD();
            resizeCanvas();
            initGameObjects();
            updateObstaclesForLevel();

            if (loopId) cancelAnimationFrame(loopId);
            gameLoop();
        }

        function endGame() {
            isGameOver = true;
            AudioEngine.stopBgm();
            if (loopId) cancelAnimationFrame(loopId);
            document.getElementById('finalLevel').innerText = `Lv.${gameLevel}`;
            document.getElementById('finalScore').innerText = `${score}점`;
            document.getElementById('gameOverModal').classList.remove('hidden');
        }

        function restartGame() {
            document.getElementById('gameOverModal').classList.add('hidden');
            startGame();
        }

        function exitToLobby() {
            isGameOver = true;
            isLevelingUp = false;
            AudioEngine.stopBgm();
            if (loopId) cancelAnimationFrame(loopId);
            document.getElementById('playScreen').classList.add('hidden');
            document.getElementById('gameOverModal').classList.add('hidden');
            document.getElementById('levelUpModal').classList.add('hidden');
            document.getElementById('lobbyScreen').classList.remove('hidden');
        }

        function rayCircleIntersect(sx, sy, dx, dy, cx, cy, r) {
            const ox = sx - cx;
            const oy = sy - cy;
            const a = dx * dx + dy * dy;
            const b = 2 * (ox * dx + oy * dy);
            const c = ox * ox + oy * oy - r * r;
            const disc = b * b - 4 * a * c;
            if (disc < 0) return null;
            const t = (-b - Math.sqrt(disc)) / (2 * a);
            if (t > 0.015) return { x: sx + dx * t, y: sy + dy * t, t: t };
            return null;
        }

        function drawLaserPath(startX, startY, dirX, dirY) {
            let currentX = startX;
            let currentY = startY;
            let currentVX = dirX;
            let currentVY = dirY;

            const maxSegments = 3;
            const segments = [];

            for (let seg = 0; seg < maxSegments; seg++) {
                let closestT = Infinity;
                let hitX = 0, hitY = 0;
                let hitType = null;
                let hitObstacle = null;

                for (let obs of obstacles) {
                    const inter = rayCircleIntersect(currentX, currentY, currentVX, currentVY, obs.x, obs.y, obs.radius + 1.5);
                    if (inter && inter.t < closestT) {
                        closestT = inter.t;
                        hitX = inter.x;
                        hitY = inter.y;
                        hitType = 'obstacle';
                        hitObstacle = obs;
                    }
                }

                let wallT = Infinity;
                let wallHitX = 0, wallHitY = 0;
                if (currentVX < 0) {
                    wallT = (WALL_LEFT - currentX) / currentVX;
                    if (wallT > 0.01 && wallT < closestT) {
                        closestT = wallT;
                        wallHitX = WALL_LEFT;
                        wallHitY = currentY + currentVY * wallT;
                        hitType = 'wall';
                        hitObstacle = null;
                    }
                } else if (currentVX > 0) {
                    wallT = (WALL_RIGHT - currentX) / currentVX;
                    if (wallT > 0.01 && wallT < closestT) {
                        closestT = wallT;
                        wallHitX = WALL_RIGHT;
                        wallHitY = currentY + currentVY * wallT;
                        hitType = 'wall';
                        hitObstacle = null;
                    }
                }

                let endX, endY;
                if (hitType === 'wall') {
                    endX = wallHitX;
                    endY = wallHitY;
                } else if (hitType === 'obstacle') {
                    endX = hitX;
                    endY = hitY;
                } else {
                    endX = currentX + currentVX * 480;
                    endY = currentY + currentVY * 480;
                }

                segments.push({ x1: currentX, y1: currentY, x2: endX, y2: endY });

                if (!hitType) break;

                currentX = endX;
                currentY = endY;

                if (hitType === 'wall') {
                    currentVX = -currentVX;
                } else if (hitType === 'obstacle' && hitObstacle) {
                    const nx = (endX - hitObstacle.x) / hitObstacle.radius;
                    const ny = (endY - hitObstacle.y) / hitObstacle.radius;
                    const dot = currentVX * nx + currentVY * ny;
                    currentVX = currentVX - 2 * dot * nx;
                    currentVY = currentVY - 2 * dot * ny;
                }
            }

            ctx.save();
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.strokeStyle = 'rgba(0, 230, 255, 0.08)';
            ctx.lineWidth = 4;
            segments.forEach(seg => {
                ctx.beginPath();
                ctx.moveTo(seg.x1, seg.y1);
                ctx.lineTo(seg.x2, seg.y2);
                ctx.stroke();
            });

            ctx.strokeStyle = '#00f5ff';
            ctx.lineWidth = 1.3;
            ctx.shadowColor = '#00f5ff';
            ctx.shadowBlur = 6;
            segments.forEach(seg => {
                ctx.beginPath();
                ctx.moveTo(seg.x1, seg.y1);
                ctx.lineTo(seg.x2, seg.y2);
                ctx.stroke();
            });

            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineWidth = 0.7;
            ctx.shadowBlur = 2;
            segments.forEach(seg => {
                ctx.beginPath();
                ctx.moveTo(seg.x1, seg.y1);
                ctx.lineTo(seg.x2, seg.y2);
                ctx.stroke();
            });

            if (segments.length > 0) {
                const last = segments[segments.length - 1];
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(last.x2, last.y2, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#00f5ff';
                ctx.beginPath();
                ctx.arc(last.x2, last.y2, 1.2, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }
